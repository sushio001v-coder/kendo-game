<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剣道ゲーム</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #fff; }
#kapp { width: 100%; max-width: 580px; padding: 0.75rem 0 1.2rem; }
#cv { display: block; width: 100%; max-width: 560px; margin: 0 auto; }
#gauges { max-width: 560px; margin: 6px auto 0; padding: 0 10px; display: flex; gap: 10px; align-items: center; }
.gb { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.glr { display: flex; justify-content: space-between; font-size: 10px; }
.gt { position: relative; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; }
.gfp { height: 100%; border-radius: 4px; width: 100%; background: #5DCAA5; }
.gfe { height: 100%; border-radius: 4px; width: 100%; background: #e24b4a; margin-left: auto; }
.gm  { position: absolute; top: -3px; bottom: -3px; width: 2px; left: 50%; background: rgba(255,255,255,0.5); border-radius: 1px; }
#msg { max-width: 560px; margin: 4px auto 0; font-size: 10px; color: rgba(255,255,255,0.35); text-align: center; min-height: 13px; }
#btns { max-width: 560px; margin: 6px auto 0; display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 5px; padding: 0 6px; }
.kb { padding: 9px 0; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); font-family: 'Courier New', monospace; font-size: 11px; cursor: pointer; text-align: center; user-select: none; -webkit-user-select: none; transition: opacity 0.15s, background 0.1s; }
.kb:active, .kb.active { background: rgba(255,255,255,0.14); }
.kb.dim { opacity: 0.22; }
#btn-up    { grid-column: 2; grid-row: 1; border-color: #5DCAA5; color: #5DCAA5; }
#btn-left  { grid-column: 1; grid-row: 2; border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); }
#btn-down  { grid-column: 2; grid-row: 2; border-color: #EF9F27; color: #EF9F27; }
#btn-right { grid-column: 3; grid-row: 2; border-color: #378ADD; color: #378ADD; }
#bottomrow { max-width: 560px; margin: 8px auto 0; display: flex; justify-content: center; }
#sbtn { padding: 10px 32px; border: 0.5px solid rgba(255,255,255,0.25); border-radius: 8px; background: transparent; color: #fff; font-family: 'Courier New', monospace; font-size: 14px; cursor: pointer; transition: background 0.15s; }
#sbtn:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div id="kapp">
  <canvas id="cv" width="560" height="270"></canvas>
  <div id="gauges">
    <div class="gb">
      <div class="glr"><span style="color:#5DCAA5">気合</span><span id="pst" style="color:#5DCAA5">満タン</span></div>
      <div class="gt"><div class="gfp" id="pfill"></div><div class="gm"></div></div>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,0.25);white-space:nowrap">vs</div>
    <div class="gb">
      <div class="glr"><span id="est" style="color:#e24b4a">満タン</span><span style="color:#e24b4a">相手気合</span></div>
      <div class="gt" style="display:flex;flex-direction:row-reverse"><div class="gfe" id="efill"></div><div class="gm"></div></div>
    </div>
  </div>
  <div id="msg">はじめるを押して試合開始</div>
  <div id="btns">
    <div class="kb" id="btn-up">↑ 面</div>
    <div class="kb" id="btn-left">← 後退</div>
    <div class="kb" id="btn-down">↓ 胴（応じ）</div>
    <div class="kb" id="btn-right">→ 前進 / 小手（応じ）</div>
  </div>
  <div id="bottomrow"><button id="sbtn">はじめる</button></div>
</div>

<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d'),W=560,H=270;
const MAAI_MAX=1.0,MAAI_CHUKAN=0.38,MAAI_KINMA=0.04;
const APPROACH=0.008,RETREAT=0.007;
const KOTE_WIN=150,DO_MIN=100,DO_MAX=380,MATCH_MS=30000;
const G_MAX=100,G_MIN=50,G_RATE=10,G_TICK=100;

let pG=G_MAX,eG=G_MAX;
let pWin=0,eWin=0,running=false,firstIppon=null,ipponLog=[];
let maai=MAAI_MAX,rightHeld=false,leftHeld=false,rightReleasedAt=null;
let enemyAttackAt=null,enemyAttackResolved=false,eNextAttacks=[],eNextTypes=[];
let currentEType='men';
let resolving=false,breathT=0;
let flashColor='#fff',flashAlpha=0,shakeX=0,shakeY=0;
let resultText='',resultColor='#fff',resultAlpha=0;
let timerStart=null,timerInterval=null,gaugeInterval=null,rafId=null;
let pAnim=null,eAnim=null;
let audioCtx=null,bgmId=null;

const ENEMY_X=430,GROUND_Y=200;
const pfill=document.getElementById('pfill');
const efill=document.getElementById('efill');
const pst=document.getElementById('pst');
const est=document.getElementById('est');

function playerX(){return ENEMY_X-80-maai*280;}
function inKinma(){return maai<=MAAI_KINMA;}
function inHitRange(){return maai<=MAAI_CHUKAN&&maai>MAAI_KINMA;}
function maaiLabel(){
  if(maai>MAAI_CHUKAN)return{t:'遠間',c:'rgba(255,255,255,0.28)'};
  if(maai>MAAI_KINMA)return{t:'中間',c:'#378ADD'};
  return{t:'近間（つばぜり）',c:'#EF9F27'};
}
function techChar(tech){
  if(tech.indexOf('面')>=0)return'メ';
  if(tech.indexOf('小手')>=0)return'コ';
  if(tech.indexOf('胴')>=0)return'ド';
  return'';
}
function randomEType(){
  const r=Math.random();
  if(r<0.5)return'men';
  if(r<0.75)return'kote';
  return'do';
}

function renderGauge(){
  pfill.style.width=pG+'%';
  efill.style.width=eG+'%';
  if(pG>=G_MAX){pfill.style.background='#5DCAA5';pst.textContent='満タン';pst.style.color='#5DCAA5';}
  else if(pG>=G_MIN){pfill.style.background='#EF9F27';pst.textContent='1/3確率';pst.style.color='#EF9F27';}
  else{pfill.style.background='#e24b4a';pst.textContent='チャージ中';pst.style.color='#e24b4a';}
  if(eG>=G_MAX){efill.style.background='#e24b4a';est.textContent='満タン';est.style.color='#e24b4a';}
  else if(eG>=G_MIN){efill.style.background='#EF9F27';est.textContent='1/3確率';est.style.color='#EF9F27';}
  else{efill.style.background='rgba(255,255,255,0.2)';est.textContent='チャージ中';est.style.color='rgba(255,255,255,0.3)';}
  const dim=pG<G_MIN;
  ['btn-up','btn-down','btn-right'].forEach(id=>{
    document.getElementById(id).classList.toggle('dim',dim);
  });
}
function tickGauge(){
  if(!running)return;
  if(pG<G_MAX)pG=Math.min(G_MAX,pG+G_RATE);
  if(eG<G_MAX)eG=Math.min(G_MAX,eG+G_RATE);
  renderGauge();
}

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function tone(freq,type,dur,vol=0.13,delay=0){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start(t0);o.stop(t0+dur);
}
function playSe(t){
  if(!audioCtx)return;
  if(t==='men'){tone(500,'square',0.12);tone(400,'square',0.09,0.1,0.08);}
  else if(t==='kote'){tone(660,'sawtooth',0.09);tone(580,'sawtooth',0.06,0.08,0.07);}
  else if(t==='do'){tone(340,'square',0.13);tone(260,'square',0.09,0.1,0.07);}
  else if(t==='hit'){tone(180,'sawtooth',0.2,0.22);}
  else if(t==='ippon'){tone(600,'square',0.08);tone(700,'square',0.08,0.12,0.12);tone(800,'square',0.15,0.14,0.24);}
  else if(t==='tsuba'){tone(260,'sine',0.08,0.1);}
}
function startBGM(){
  if(!audioCtx||bgmId!==null)return;
  const notes=[220,247,262,294,330,294,262,247,196,220];let i=0;
  bgmId=setInterval(()=>{
    tone(notes[i%notes.length],'triangle',0.32,0.03);
    if(i%4===0)tone(notes[i%notes.length]/2,'sine',0.6,0.015);
    i++;
  },370);
}
function stopBGM(){if(bgmId!==null){clearInterval(bgmId);bgmId=null;}}
function speak(txt){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP';u.rate=1.5;u.pitch=1.2;u.volume=1;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

function setMsg(t,c='rgba(255,255,255,0.35)'){const el=document.getElementById('msg');el.textContent=t;el.style.color=c;}
function showResult(t,c){resultText=t;resultColor=c;resultAlpha=1.0;}
function flash(c,a=0.4){flashColor=c;flashAlpha=a;}
function shake(n=9){shakeX=(Math.random()-.5)*n*2;shakeY=(Math.random()-.5)*n*2;}
function updateTimer(){
  if(!timerStart||!running)return;
  if(MATCH_MS-(performance.now()-timerStart)<=0&&!resolving)timeUp();
}
function timeUp(){
  running=false;stopBGM();clearInterval(timerInterval);clearInterval(gaugeInterval);
  if(pWin>eWin){showResult('勝利！','#EF9F27');setMsg('2本勝ち！','#EF9F27');}
  else if(eWin>pWin){showResult('負け…','#e24b4a');setMsg('相手の2本勝ち','#e24b4a');}
  else if(pWin===1&&eWin===1){
    if(firstIppon==='player'){showResult('勝利！（先取）','#EF9F27');setMsg('先に取った方の勝ち！','#EF9F27');}
    else{showResult('負け（先取）','#e24b4a');setMsg('先に取られた…','#e24b4a');}
  }else{showResult('引き分け','rgba(255,255,255,0.5)');setMsg('引き分け','rgba(255,255,255,0.4)');}
  document.getElementById('sbtn').textContent='もう一度';
}
function scheduleEnemyBurst(){
  const now=performance.now();
  eNextAttacks=[];eNextTypes=[];enemyAttackResolved=false;
  const count=1+Math.floor(Math.random()*3);
  let t=now+1200+Math.random()*1200;
  for(let i=0;i<count;i++){
    eNextAttacks.push(t);
    eNextTypes.push(randomEType());
    t+=800+Math.random()*600;
  }
  enemyAttackAt=eNextAttacks.shift();
  currentEType=eNextTypes.shift();
}
function resetToStart(){
  maai=MAAI_MAX;resolving=false;rightReleasedAt=null;
  pAnim=null;eAnim=null;pG=G_MAX;eG=G_MAX;
  renderGauge();scheduleEnemyBurst();setMsg('→で中間まで詰めて打て！');
}
function startPAnim(t){pAnim={type:t,t:0,dur:{men:440,kote:300,do:400,hit:320}[t]||300};}
function startEAnim(t){eAnim={type:t,t:0,dur:{men:440,kote:300,do:400,hit:320}[t]||300};}

function ippon(winner,tech){
  resolving=true;
  if(firstIppon===null)firstIppon=winner;
  ipponLog.push({winner,tech});
  playSe('ippon');
  if(winner==='player'){
    pWin++;showResult('一本！ '+tech,'#5DCAA5');flash('#5DCAA5',0.22);setMsg(tech+'が決まった！','#5DCAA5');
    startEAnim('hit');
  }else{
    eWin++;showResult('やられた… '+tech,'#e24b4a');flash('#e24b4a',0.48);shake(12);setMsg('相手の'+tech,'#e24b4a');
    playSe('hit');startPAnim('hit');startEAnim(currentEType);
  }
  if(pWin>=2||eWin>=2)setTimeout(()=>{stopBGM();clearInterval(gaugeInterval);endMatch();},1500);
  else setTimeout(resetToStart,1500);
}
function endMatch(){
  running=false;stopBGM();clearInterval(timerInterval);clearInterval(gaugeInterval);
  if(pWin>=2){showResult('勝利！','#EF9F27');setMsg('2本勝ち！','#EF9F27');}
  else{showResult('敗れた…','#e24b4a');setMsg('2本負け…','rgba(255,255,255,0.35)');}
  document.getElementById('sbtn').textContent='もう一度';
}

function prepareAttack(type){
  if(pG<G_MIN)return false;
  if(inKinma()&&!leftHeld){playSe('tsuba');setMsg('つばぜり合い — 後退しながら打て！','rgba(239,159,39,0.9)');return false;}
  const ratio=pG/G_MAX;
  pG=0;renderGauge();
  startPAnim(type);
  playSe(type==='men'?'men':type==='kote'?'kote':'do');
  speak(type==='men'?'メン！':type==='kote'?'コテ！':'ドウ！');
  if(resolving||!running)return false;
  if(!inHitRange()){
    if(inKinma())setMsg('近すぎ！少し引いてから打て','rgba(255,255,255,0.3)');
    else setMsg('間合いが遠い（中間まで詰めろ）','rgba(255,255,255,0.3)');
    return false;
  }
  if(ratio<1.0&&Math.random()>1/3){setMsg('気合が足りなかった…','rgba(255,255,255,0.3)');return false;}
  return true;
}
function tryMen(now){
  if(!prepareAttack('men'))return;
  if(enemyAttackAt&&!enemyAttackResolved&&currentEType==='men'){
    const diff=now-enemyAttackAt;
    if(Math.abs(diff)<200){enemyAttackResolved=true;diff<0?ippon('player','面'):ippon('enemy','面');return;}
  }
  ippon('player','面');
}
function tryKote(now){
  if(!prepareAttack('kote'))return;
  const sr=rightReleasedAt?now-rightReleasedAt:9999;
  if(sr>=280){setMsg('→を離してすぐ押し直せ！','rgba(255,255,255,0.3)');return;}
  if(!enemyAttackAt||enemyAttackResolved){setMsg('相手が面を打ってこない','rgba(255,255,255,0.3)');return;}
  if(currentEType!=='men'){setMsg('相手の技に合わない（小手は面への応じ）','rgba(255,255,255,0.3)');return;}
  if(Math.abs(now-enemyAttackAt)<=KOTE_WIN){enemyAttackResolved=true;ippon('player','小手');}
  else setMsg('タイミングが合わなかった…','rgba(255,255,255,0.3)');
}
function tryDo(now){
  if(!prepareAttack('do'))return;
  if(!enemyAttackAt||enemyAttackResolved){setMsg('相手が面を打ってこない','rgba(255,255,255,0.3)');return;}
  if(currentEType!=='men'){setMsg('相手の技に合わない（胴は面への応じ）','rgba(255,255,255,0.3)');return;}
  const s=now-enemyAttackAt;
  if(s>=DO_MIN&&s<=DO_MAX){enemyAttackResolved=true;ippon('player','胴');}
  else setMsg(s<DO_MIN?'早すぎた！':'遅すぎた…','rgba(255,255,255,0.3)');
}

function progOf(a){return a?Math.min(1,a.t/a.dur):0;}
function drawFighter(x,y,facing,color,anim,tsuba){
  const p=progOf(anim),type=anim?anim.type:null,sw=Math.sin(p*Math.PI);
  cx.save();
  if(type==='hit')cx.translate(facing*(-15)*sw,-5*sw);
  cx.strokeStyle=color;cx.fillStyle=color;
  cx.lineWidth=3;cx.lineCap='round';cx.lineJoin='round';
  const headR=13,torsoH=38,legLen=32;
  const headY=y-legLen-torsoH-headR*2,shoulderY=headY+headR*2,hipY=shoulderY+torsoH;
  const walk=running&&!resolving&&!tsuba?Math.sin(breathT*3)*8:0;
  cx.beginPath();cx.arc(x,headY+headR,headR,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.moveTo(x,shoulderY+headR);cx.lineTo(x,hipY);cx.stroke();
  cx.beginPath();cx.moveTo(x,hipY);cx.lineTo(x-11+walk,y);cx.stroke();
  cx.beginPath();cx.moveTo(x,hipY);cx.lineTo(x+11-walk,y);cx.stroke();
  const rX=x+facing*8,rY=shoulderY+10;
  if(tsuba&&type!=='men'&&type!=='kote'&&type!=='do'){
    const elbX=rX+facing*24,elbY=rY-6;
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(elbX,elbY);cx.stroke();
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(x-facing*8,rY+12);cx.stroke();
    cx.strokeStyle='#c8a97e';cx.lineWidth=3.5;
    cx.beginPath();cx.moveTo(elbX,elbY);cx.lineTo(elbX+facing*28,elbY+4);cx.stroke();
  }else if(type==='men'){
    const lp=p<0.45?p/0.45:1-(p-0.45)/0.55,elbX=rX+facing*16,elbY=rY-lp*20;
    const angle=(-Math.PI*0.55)*lp;
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(elbX,elbY);cx.stroke();
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(x-facing*12,rY+14);cx.stroke();
    cx.strokeStyle='#c8a97e';cx.lineWidth=3.5;
    cx.beginPath();cx.moveTo(elbX,elbY);cx.lineTo(elbX+Math.cos(-Math.PI*0.25+angle)*facing*54,elbY+Math.sin(-Math.PI*0.25+angle)*54);cx.stroke();
  }else if(type==='kote'){
    const thrust=sw,elbX=rX+facing*(18+thrust*24),elbY=rY;
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(elbX,elbY);cx.stroke();
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(x-facing*10,rY+16);cx.stroke();
    cx.strokeStyle='#c8a97e';cx.lineWidth=3.5;
    cx.beginPath();cx.moveTo(elbX,elbY);cx.lineTo(elbX+facing*(36+thrust*16),elbY-4+thrust*16);cx.stroke();
  }else if(type==='do'){
    const elbX=rX+facing*(14+sw*6),elbY=rY+6;
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(elbX,elbY);cx.stroke();
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(x-facing*10,rY+16);cx.stroke();
    cx.strokeStyle='#c8a97e';cx.lineWidth=3.5;
    cx.beginPath();cx.moveTo(elbX,elbY);cx.lineTo(elbX+facing*(22-sw*42),elbY+14+sw*28);cx.stroke();
  }else{
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(rX+facing*20,rY+8);cx.stroke();
    cx.beginPath();cx.moveTo(rX,rY);cx.lineTo(x-facing*10,rY+16);cx.stroke();
    cx.strokeStyle='#c8a97e';cx.lineWidth=3;
    cx.beginPath();cx.moveTo(rX+facing*20,rY+8);cx.lineTo(rX+facing*52,rY-36);cx.stroke();
  }
  cx.restore();
}
function drawIpponPips(){
  const R=9,cy2=20;
  const pPos=[{x:88,y:cy2},{x:112,y:cy2}],ePos=[{x:472,y:cy2},{x:448,y:cy2}];
  const pI=ipponLog.filter(l=>l.winner==='player'),eI=ipponLog.filter(l=>l.winner==='enemy');
  for(let i=0;i<2;i++){
    const pos=pPos[i];
    if(i<pI.length){cx.fillStyle='#5DCAA5';cx.beginPath();cx.arc(pos.x,pos.y,R,0,Math.PI*2);cx.fill();cx.font='500 10px Courier New';cx.fillStyle='#000';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(techChar(pI[i].tech),pos.x,pos.y);}
    else{cx.strokeStyle='rgba(93,202,165,0.35)';cx.lineWidth=1.5;cx.beginPath();cx.arc(pos.x,pos.y,R,0,Math.PI*2);cx.stroke();}
  }
  for(let i=0;i<2;i++){
    const pos=ePos[i];
    if(i<eI.length){cx.fillStyle='#e24b4a';cx.beginPath();cx.arc(pos.x,pos.y,R,0,Math.PI*2);cx.fill();cx.font='500 10px Courier New';cx.fillStyle='#000';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(techChar(eI[i].tech),pos.x,pos.y);}
    else{cx.strokeStyle='rgba(226,75,74,0.35)';cx.lineWidth=1.5;cx.beginPath();cx.arc(pos.x,pos.y,R,0,Math.PI*2);cx.stroke();}
  }
  cx.textBaseline='alphabetic';
}
function drawTopHUD(now){
  const rem=timerStart?Math.max(0,MATCH_MS-(now-timerStart)):MATCH_MS,secs=Math.ceil(rem/1000);
  cx.fillStyle='rgba(0,0,0,0.45)';cx.fillRect(0,0,W,58);
  cx.font='500 28px Courier New';cx.fillStyle=secs<=8?'#e24b4a':'#EF9F27';cx.textAlign='center';cx.fillText(secs,W/2,36);
  cx.font='11px Courier New';cx.fillStyle='rgba(93,202,165,0.6)';cx.textAlign='center';cx.fillText('自分',100,50);
  cx.fillStyle='rgba(226,75,74,0.6)';cx.fillText('相手',460,50);
  const ml=maaiLabel();cx.font='11px Courier New';cx.fillStyle=ml.c;cx.textAlign='center';cx.fillText(ml.t,W/2,50);
  drawIpponPips();
  if(inKinma()&&running&&!resolving){cx.font='500 11px Courier New';cx.fillStyle='#EF9F27';cx.textAlign='center';cx.fillText('つばぜり合い — 後退しながら打て',W/2,68);}
}
function drawBg(){
  cx.fillStyle='#0d0d0d';cx.fillRect(0,0,W,H);
  cx.fillStyle='#1a1410';cx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  cx.strokeStyle='rgba(255,255,255,0.07)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,GROUND_Y);cx.lineTo(W,GROUND_Y);cx.stroke();
  cx.strokeStyle='rgba(255,255,255,0.02)';
  for(let i=0;i<8;i++){cx.beginPath();cx.moveTo(i*80,GROUND_Y);cx.lineTo(i*80,H);cx.stroke();}
}
function drawZones(){
  const xC=ENEMY_X-80-MAAI_CHUKAN*280,xK=ENEMY_X-80-MAAI_KINMA*280;
  cx.globalAlpha=0.1;cx.fillStyle='#5DCAA5';cx.fillRect(xK,GROUND_Y,xC-xK,12);
  cx.fillStyle='#EF9F27';cx.fillRect(0,GROUND_Y,xK,12);cx.globalAlpha=1;
  cx.setLineDash([4,5]);cx.lineWidth=1;
  cx.strokeStyle='rgba(55,138,221,0.5)';cx.beginPath();cx.moveTo(xC,GROUND_Y-4);cx.lineTo(xC,GROUND_Y+44);cx.stroke();
  cx.strokeStyle='rgba(239,159,39,0.55)';cx.beginPath();cx.moveTo(xK,GROUND_Y-4);cx.lineTo(xK,GROUND_Y+44);cx.stroke();
  cx.setLineDash([]);cx.font='10px Courier New';cx.textAlign='center';
  cx.fillStyle='rgba(55,138,221,0.55)';cx.fillText('中間',xC,GROUND_Y+54);
  cx.fillStyle='rgba(239,159,39,0.6)';cx.fillText('近間',xK,GROUND_Y+54);
}
function drawWarning(now){
  if(!enemyAttackAt||enemyAttackResolved||resolving)return;
  const diff=enemyAttackAt-now;
  if(diff<400&&diff>-200){
    const a=Math.max(0,Math.min(1,1-(diff+200)/600));
    cx.globalAlpha=a;
    const typeLabel={men:'面！',kote:'小手！',do:'胴！'}[currentEType]||'！';
    const typeColor={men:'#e24b4a',kote:'#378ADD',do:'#EF9F27'}[currentEType]||'#e24b4a';
    cx.font='500 22px Courier New';cx.fillStyle=typeColor;cx.textAlign='center';
    cx.fillText(typeLabel,ENEMY_X,GROUND_Y-110);cx.globalAlpha=1;
  }
}
function drawResult2(){
  if(resultAlpha<0.01)return;
  cx.globalAlpha=Math.min(1,resultAlpha);cx.font='500 26px Courier New';cx.fillStyle=resultColor;cx.textAlign='center';
  cx.fillText(resultText,W/2,H/2+10);cx.globalAlpha=1;resultAlpha*=0.96;
}

function loop(){
  const now=performance.now();
  breathT+=0.038;
  if(pAnim){pAnim.t+=16;if(pAnim.t>=pAnim.dur)pAnim=null;}
  if(eAnim){eAnim.t+=16;if(eAnim.t>=eAnim.dur)eAnim=null;}
  if(running&&!resolving){
    if(rightHeld)maai=Math.max(0,maai-APPROACH);
    if(leftHeld)maai=Math.min(MAAI_MAX,maai+RETREAT);
    if(enemyAttackAt&&!enemyAttackResolved){
      const since=now-enemyAttackAt;
      if(since>DO_MAX+80){
        enemyAttackResolved=true;
        if(inHitRange()&&eG>=G_MIN){
          eG=0;renderGauge();
          const techName={men:'面',kote:'小手',do:'胴'}[currentEType]||'面';
          ippon('enemy',techName);
        }else{
          setMsg('相手の攻撃が届かなかった','rgba(255,255,255,0.25)');
          if(eNextAttacks.length>0){enemyAttackAt=eNextAttacks.shift();currentEType=eNextTypes.shift()||'men';enemyAttackResolved=false;}
          else scheduleEnemyBurst();
        }
      }
    }else if(!enemyAttackAt||enemyAttackResolved){
      if(eNextAttacks.length>0){enemyAttackAt=eNextAttacks.shift();currentEType=eNextTypes.shift()||'men';enemyAttackResolved=false;}
    }
  }
  let eDisp=eAnim;
  if(!eDisp&&enemyAttackAt&&!enemyAttackResolved){
    const s=now-enemyAttackAt;
    if(s>-200&&s<450)eDisp={type:currentEType,t:Math.max(0,s+200),dur:650};
  }
  if(flashAlpha>0.01)flashAlpha*=0.8;else flashAlpha=0;
  if(Math.abs(shakeX)>0.4){shakeX*=0.72;shakeY*=0.72;}else{shakeX=shakeY=0;}
  const tsuba=inKinma();
  cx.save();cx.translate(shakeX,shakeY);
  drawBg();drawTopHUD(now);drawZones();
  drawFighter(playerX(),GROUND_Y,1,'#5DCAA5',pAnim,tsuba);
  drawFighter(ENEMY_X,GROUND_Y,-1,'#e24b4a',eDisp,tsuba);
  drawWarning(now);
  if(inHitRange()&&running&&!resolving){cx.font='500 10px Courier New';cx.fillStyle='#5DCAA5';cx.textAlign='center';cx.fillText('↑:面  →離して→:小手（応じ）  ↓:胴（応じ）',W/2,78);}
  if(flashAlpha>0.01){cx.globalAlpha=flashAlpha;cx.fillStyle=flashColor;cx.fillRect(-20,-20,W+40,H+40);cx.globalAlpha=1;}
  drawResult2();cx.restore();
  rafId=requestAnimationFrame(loop);
}
rafId=requestAnimationFrame(loop);

function startGame(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(gaugeInterval){clearInterval(gaugeInterval);gaugeInterval=null;}
  stopBGM();initAudio();startBGM();
  pWin=0;eWin=0;firstIppon=null;ipponLog=[];
  maai=MAAI_MAX;running=true;resolving=false;
  rightHeld=false;leftHeld=false;rightReleasedAt=null;
  enemyAttackAt=null;enemyAttackResolved=false;eNextAttacks=[];eNextTypes=[];currentEType='men';
  flashAlpha=0;shakeX=shakeY=0;resultAlpha=0;pAnim=null;eAnim=null;
  pG=G_MAX;eG=G_MAX;renderGauge();
  document.getElementById('sbtn').textContent='リセット';
  clearInterval(timerInterval);timerStart=performance.now();
  timerInterval=setInterval(updateTimer,100);
  gaugeInterval=setInterval(tickGauge,G_TICK);
  scheduleEnemyBurst();setMsg('→で中間まで詰めて打て！');
  rafId=requestAnimationFrame(loop);
}
document.getElementById('sbtn').addEventListener('click',startGame);

function bindBtn(id,dn,up){
  const el=document.getElementById(id);
  el.addEventListener('mousedown',e=>{el.classList.add('active');dn(performance.now());});
  el.addEventListener('mouseup',e=>{el.classList.remove('active');up(performance.now());});
  el.addEventListener('mouseleave',e=>{el.classList.remove('active');up(performance.now());});
  el.addEventListener('touchstart',e=>{e.preventDefault();el.classList.add('active');dn(performance.now());},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('active');up(performance.now());},{passive:false});
}
bindBtn('btn-right',now=>{rightHeld=true;if(rightReleasedAt&&(now-rightReleasedAt)<280)tryKote(now);},now=>{rightHeld=false;rightReleasedAt=now;});
bindBtn('btn-left',now=>{leftHeld=true;},now=>{leftHeld=false;});
bindBtn('btn-up',now=>{tryMen(now);},()=>{});
bindBtn('btn-down',now=>{tryDo(now);},()=>{});
document.addEventListener('keydown',e=>{
  if(e.repeat)return;const now=performance.now();
  if(e.key==='ArrowRight'){e.preventDefault();document.getElementById('btn-right').classList.add('active');rightHeld=true;if(rightReleasedAt&&(now-rightReleasedAt)<280)tryKote(now);}
  if(e.key==='ArrowLeft'){e.preventDefault();document.getElementById('btn-left').classList.add('active');leftHeld=true;}
  if(e.key==='ArrowUp'){e.preventDefault();document.getElementById('btn-up').classList.add('active');tryMen(now);}
  if(e.key==='ArrowDown'){e.preventDefault();document.getElementById('btn-down').classList.add('active');tryDo(now);}
});
document.addEventListener('keyup',e=>{
  const now=performance.now();
  if(e.key==='ArrowRight'){document.getElementById('btn-right').classList.remove('active');rightHeld=false;rightReleasedAt=now;}
  if(e.key==='ArrowLeft'){document.getElementById('btn-left').classList.remove('active');leftHeld=false;}
  if(e.key==='ArrowUp'){document.getElementById('btn-up').classList.remove('active');}
  if(e.key==='ArrowDown'){document.getElementById('btn-down').classList.remove('active');}
});
</script>
</body>
</html>
